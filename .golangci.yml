version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gocritic
    - unconvert
    - unparam
  settings:
    errcheck: {}

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/billcobbler/golinks

issues:
  exclude-rules:
    # tx.Rollback in defer is intentionally unchecked throughout the codebase.
    - text: "Error return value of `tx.Rollback` is not checked"
      linters: [errcheck]
    # rows.Close in defer is intentionally unchecked.
    - text: "Error return value of `rows.Close` is not checked"
      linters: [errcheck]
