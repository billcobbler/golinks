version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gocritic
    - unconvert
    - unparam
  exclusions:
    rules:
      - text: "Error return value of `tx.Rollback` is not checked"
        linters: [errcheck]
      - text: "Error return value of `.*[Rr]ows\\.Close` is not checked"
        linters: [errcheck]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/billcobbler/golinks
