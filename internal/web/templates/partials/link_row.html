{{define "link_row"}}
<tr id="row-{{.ID}}">
  <td>
    <a href="/{{.Shortname}}" target="_blank" rel="noopener">{{.Shortname}}</a>{{if .IsPattern}}&nbsp;<sup title="pattern link">*</sup>{{end}}
  </td>
  <td>
    <a href="{{.TargetURL}}" target="_blank" rel="noopener" class="secondary">{{truncate .TargetURL 55}}</a>
  </td>
  <td>{{.Description}}</td>
  <td>{{.ClickCount}}</td>
  <td class="row-actions">
    <button class="outline"
            hx-get="/-/links/edit?name={{.Shortname}}"
            hx-target="closest tr"
            hx-swap="outerHTML">Edit</button>
    <button class="outline contrast"
            hx-delete="/-/links/delete?name={{.Shortname}}"
            hx-target="closest tr"
            hx-swap="outerHTML swap:0.3s"
            hx-confirm="Delete go/{{.Shortname}}?">Del</button>
  </td>
</tr>
{{end}}
