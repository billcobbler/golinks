  #         refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
  #         zip-path: bin/golinks-extension-chrome-${{ github.ref_name }}.zip

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: '{binaries,checksums}-*'

      - name: Merge checksums
        run: cat dist/checksums*.txt > checksums.txt 2>/dev/null || touch checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            checksums.txt
