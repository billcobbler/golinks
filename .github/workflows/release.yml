name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/golinks-server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/server

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/golinks-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/cli

      - name: Archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar czf "golinks-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "golinks-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar czf "golinks-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "golinks-${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum *.tar.gz >> ../checksums.txt

      - name: Archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip "golinks-server-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            "golinks-server-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          zip "golinks-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            "golinks-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          sha256sum *.zip >> ../checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.goos }}-${{ matrix.goarch }}
          path: checksums.txt
          if-no-files-found: error

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "golinks-darwin-*.tar.gz" \
            --pattern "golinks-linux-*.tar.gz" \
            --pattern "golinks-server-darwin-*.tar.gz" \
            --pattern "golinks-server-linux-*.tar.gz"

      - name: Compute SHA256s
        run: |
          echo "SHA256_DARWIN_ARM64=$(sha256sum golinks-darwin-arm64.tar.gz | awk '{print $1}')"             >> $GITHUB_ENV
          echo "SHA256_DARWIN_AMD64=$(sha256sum golinks-darwin-amd64.tar.gz | awk '{print $1}')"             >> $GITHUB_ENV
          echo "SHA256_LINUX_ARM64=$(sha256sum golinks-linux-arm64.tar.gz | awk '{print $1}')"               >> $GITHUB_ENV
          echo "SHA256_LINUX_AMD64=$(sha256sum golinks-linux-amd64.tar.gz | awk '{print $1}')"               >> $GITHUB_ENV
          echo "SHA256_SERVER_DARWIN_ARM64=$(sha256sum golinks-server-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA256_SERVER_DARWIN_AMD64=$(sha256sum golinks-server-darwin-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA256_SERVER_LINUX_ARM64=$(sha256sum golinks-server-linux-arm64.tar.gz | awk '{print $1}')"   >> $GITHUB_ENV
          echo "SHA256_SERVER_LINUX_AMD64=$(sha256sum golinks-server-linux-amd64.tar.gz | awk '{print $1}')"   >> $GITHUB_ENV

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: billcobbler/homebrew-golinks
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-golinks
          ref: main

      - name: Update formulas
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p homebrew-golinks/Formula

          sed \
            -e "s/GOLINKS_VERSION/${VERSION}/g" \
            -e "s/GOLINKS_SHA256_DARWIN_ARM64/${SHA256_DARWIN_ARM64}/g" \
            -e "s/GOLINKS_SHA256_DARWIN_AMD64/${SHA256_DARWIN_AMD64}/g" \
            -e "s/GOLINKS_SHA256_LINUX_ARM64/${SHA256_LINUX_ARM64}/g" \
            -e "s/GOLINKS_SHA256_LINUX_AMD64/${SHA256_LINUX_AMD64}/g" \
            homebrew-tap/Formula/golinks.rb > homebrew-golinks/Formula/golinks.rb

          sed \
            -e "s/GOLINKS_VERSION/${VERSION}/g" \
            -e "s/GOLINKS_SHA256_SERVER_DARWIN_ARM64/${SHA256_SERVER_DARWIN_ARM64}/g" \
            -e "s/GOLINKS_SHA256_SERVER_DARWIN_AMD64/${SHA256_SERVER_DARWIN_AMD64}/g" \
            -e "s/GOLINKS_SHA256_SERVER_LINUX_ARM64/${SHA256_SERVER_LINUX_ARM64}/g" \
            -e "s/GOLINKS_SHA256_SERVER_LINUX_AMD64/${SHA256_SERVER_LINUX_AMD64}/g" \
            homebrew-tap/Formula/golinks-server.rb > homebrew-golinks/Formula/golinks-server.rb

      - name: Commit and push
        run: |
          cd homebrew-golinks
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update to ${{ github.ref_name }}"
          git push

